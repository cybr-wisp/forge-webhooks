<svg width="680" height="256" viewBox="0 0 680 256" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Forge webhook delivery platform architecture</title>
<desc>External webhook sources send POST requests to a Rails API, which persists payloads as JSONB in PostgreSQL. A React dashboard fetches stored webhooks from the API, and the API can replay any stored payload to a target endpoint in one action.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<line x1="210" y1="68" x2="268" y2="68" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="239" y="58" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">POST</text>

<line x1="430" y1="68" x2="488" y2="68" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="459" y="58" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">INSERT</text>

<line x1="350" y1="96" x2="350" y2="158" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

<path d="M430,84 L455,84 L455,188 L488,188" fill="none" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="462" y="138" text-anchor="start" font-family="sans-serif" font-size="12" fill="#5F5E5A">1-click</text>
<text x="462" y="152" text-anchor="start" font-family="sans-serif" font-size="12" fill="#5F5E5A">replay</text>

<g>
<rect x="40" y="40" width="170" height="56" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="125" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Webhook sources</text>
<text x="125" y="78" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">Stripe, GitHub, etc</text>
</g>

<g>
<rect x="270" y="40" width="160" height="56" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="350" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Rails API</text>
<text x="350" y="78" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#085041">Ingest + replay</text>
</g>

<g>
<rect x="490" y="40" width="150" height="56" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="565" y="58" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">PostgreSQL</text>
<text x="565" y="78" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0C447C">JSONB storage</text>
</g>

<g>
<rect x="270" y="160" width="160" height="56" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text x="350" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">React dashboard</text>
<text x="350" y="198" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">Vite + fetch</text>
</g>

<g>
<rect x="490" y="160" width="150" height="56" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="565" y="178" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Replay target</text>
<text x="565" y="198" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#444441">Any HTTP endpoint</text>
</g>
</svg>
